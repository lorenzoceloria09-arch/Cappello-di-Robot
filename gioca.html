<!DOCTYPE html>
<html lang="it">
<head>

    <link rel="stylesheet" href="giocaCdB.css">
</head>
<body>

    <a href="index.html" class="back-link">← Torna alla Sezione Scelte</a>

    <div class="grid-domande" id="gridDomande"></div>

    <div class="modale" id="modale">

            <p class="modale-testo" id="modaleDomanda"></p>
            <div class="buttons">
                <button class="btn btn-vero" id="btnVero">✔ VERO</button>
                <button class="btn btn-falso" id="btnFalso">✘ FALSO</button>
            </div>
            <p class="risultato-testo" id="modaleRisultato"></p>
        </div>
    </div>

    <script src="GCdB.js"></script>
